{% extends 'base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-lg-6"><div class="d-flex align-items-center gap-3 mb-3"><a href="{{url_for('players.players')}}" class="btn btn-outline-secondary">← Voltar</a><h1 class="h3 mb-0">Editar peladeiro</h1></div><div class="card shadow-sm"><div class="card-body p-4"><form method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/><label class="form-label">Nome completo</label><input name="name" value="{{player.name}}" class="form-control mb-3" required><label class="form-label">Nome de Guerra</label><input name="war_name" value="{{player.war_name}}" class="form-control mb-3"><label class="form-label">Gênero</label><select name="gender" class="form-select mb-3"><option value="male" {{'selected' if player.gender == 'male'}}>Masculino</option><option value="female" {{'selected' if player.gender == 'female'}}>Feminino</option><option value="other" {{'selected' if player.gender == 'other'}}>Outro / não informar</option></select><label class="form-label">CPF</label><input name="cpf" value="{{player.cpf}}" class="form-control mb-3" inputmode="numeric" maxlength="14" placeholder="000.000.000-00"><label class="form-label">E-mail</label><input type="email" name="email" value="{{player.email}}" class="form-control mb-3"><label class="form-label">Telefone</label><input name="phone" value="{{player.phone}}" class="form-control mb-3"><div class="emergency-field p-3 rounded mb-3"><label class="form-label fw-bold text-danger">Telefone de emergência</label><input name="emergency_phone" value="{{player.emergency_phone}}" class="form-control border-danger"></div><label class="form-label">Foto do peladeiro</label><input type="file" name="photo" class="form-control mb-3" accept="image/jpeg,image/png,image/webp">{% if player.thumbnail_data %}<img src="{{player.thumbnail_data}}" alt="Foto atual" class="rounded-circle mb-3" width="80" height="80" style="object-fit:cover">{% endif %}<label class="form-label">Mensalidade</label><select name="membership_type" class="form-select mb-4"><option value="regular" {{'selected' if player.membership_type=='regular'}}>Contribuinte — R$ 15/mês</option><option value="goalkeeper" {{'selected' if player.membership_type=='goalkeeper'}}>Goleiro — isento</option><option value="board" {{'selected' if player.membership_type=='board'}}>Diretoria — isento</option><option value="veteran" {{'selected' if player.membership_type=='veteran'}}>Veterano — isento</option><option value="collaborator" {{'selected' if player.membership_type=='collaborator'}}>Colaborador — isento</option></select><button class="btn btn-success btn-lg w-100">Salvar alterações</button></form></div></div><div class="card shadow-sm mt-4"><div class="card-body p-4"><h2 class="h5">Acesso à venda rápida</h2><p class="text-muted small">Defina ou altere a senha usada com o nome de guerra. Mínimo de 8 caracteres.</p><form method="post" action="{{url_for('players.reset_player_password',player_id=player.id)}}"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><label class="form-label">Nova senha</label><input type="password" name="new_password" class="form-control mb-3" minlength="8" autocomplete="new-password" required><button class="btn btn-outline-primary w-100">Alterar senha do peladeiro</button></form></div></div></div></div>{% endblock %}
