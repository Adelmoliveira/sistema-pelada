{% extends 'base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-lg-7"><div class="d-flex align-items-center gap-3 mb-3"><a href="{{url_for('products')}}" class="btn btn-outline-secondary">← Voltar</a><h1 class="h3 mb-0">Editar produto</h1></div><div class="card shadow-sm"><div class="card-body p-4"><form method="post"><label class="form-label">Nome</label><input name="name" value="{{product.name}}" class="form-control mb-3" required><label class="form-label">Categoria</label><select name="category" class="form-select mb-3">{% for category in ['Cerveja','Refrigerante','Água Mineral com gás','Água Mineral sem gás','Energético','Suco','Isotônico','Salgadinho','Outros'] %}<option {{'selected' if product.category==category}}>{{category}}</option>{% endfor %}</select><div class="row mb-3"><div class="col"><label class="form-label">Tipo/embalagem</label><select name="package_type" class="form-select"><option value="" {{'selected' if not product.package_type}}>Não se aplica</option>{% for kind in ['Lata','Garrafa','PET'] %}<option {{'selected' if product.package_type==kind}}>{{kind}}</option>{% endfor %}</select></div><div class="col"><label class="form-label">Unidades por caixa</label><input type="number" min="0" name="units_per_case" value="{{product.units_per_case}}" class="form-control"></div></div><div class="row mb-3"><div class="col"><label class="form-label">Preço unitário</label><input name="price" value="{{'%.2f'|format(product.price_cents/100)|replace('.',',')}}" class="form-control" required></div><div class="col"><label class="form-label">Custo unitário</label><input name="cost" value="{{'%.2f'|format(product.cost_cents/100)|replace('.',',')}}" class="form-control"></div></div><label class="form-label">Alerta quando restarem</label><input type="number" min="0" name="min_stock" value="{{product.min_stock}}" class="form-control mb-2"><div class="alert alert-info mt-3">Estoque atual: <strong>{{product.stock}} unidades</strong>. Ajustes de quantidade devem ser registrados na aba Estoque.</div><button class="btn btn-success btn-lg w-100">Salvar alterações</button></form></div></div></div></div>{% endblock %}
