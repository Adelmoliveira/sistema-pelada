{% extends 'base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-xl-9"><h1 class="h3">Venda rápida</h1>
{% if not players or not products %}<div class="alert alert-warning">Cadastre ao menos um peladeiro e um produto com estoque antes de vender.</div>{% endif %}
<form method="post" id="sale-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/><div class="card shadow-sm mb-3"><div class="card-body"><label class="form-label fw-bold">1. Quem está comprando?</label><select name="player_id" class="form-select form-select-lg" required><option value="">Selecione o peladeiro</option>{% for p in players %}<option value="{{p.id}}">{{p.war_name or p.name}}</option>{% endfor %}</select></div></div>
<div class="card shadow-sm mb-3"><div class="card-body"><div class="d-flex justify-content-between"><label class="form-label fw-bold">2. Produtos</label><button type="button" id="add" class="btn btn-sm btn-outline-success">+ Adicionar item</button></div><div id="items"></div></div></div>
<div class="card shadow-sm"><div class="card-body"><div class="row g-3 align-items-end"><div class="col-md-5"><label class="form-label fw-bold">3. Pagamento</label><select name="payment_method" id="payment-method" class="form-select" required><option>Pix</option><option>Dinheiro</option>{% if current_user.role in ['manager','staff'] %}<option>Débito</option><option>Cortesia</option>{% endif %}</select></div><div class="col-md-7"><label class="form-label">Observação</label><input name="notes" class="form-control"></div></div><hr><div class="d-flex flex-wrap gap-3 justify-content-between align-items-center"><div><span class="text-muted">Total</span><div id="total" class="display-6 fw-bold text-success">R$ 0,00</div></div><div class="d-flex gap-2"><button type="button" id="generate-pix" class="btn btn-outline-success btn-lg">Gerar QR Code Pix</button><button class="btn btn-success btn-lg" {{'disabled' if not players or not products}}>Finalizar venda</button></div></div></div></div></form></div></div>
<div class="modal fade" id="pix-modal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><div><h2 class="modal-title h5">Pagamento via Pix</h2><small class="text-muted" id="pix-summary"></small></div><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="pix-image" class="img-fluid mb-3 d-none" style="max-width:280px" alt="QR Code Pix"><p class="mb-2"><strong>Chave:</strong> <span id="pix-key"></span></p><label class="form-label d-block text-start">Pix Copia e Cola</label><textarea id="pix-payload" class="form-control small" rows="4" readonly></textarea><button type="button" id="copy-pix" class="btn btn-outline-success w-100 mt-2">Copiar código Pix</button><div id="pix-error" class="alert alert-danger mt-3 d-none"></div></div></div></div></div>
<template id="row"><div class="row g-2 item-row mb-2"><div class="col-8"><select name="product_id" class="form-select product"><option value="">Escolha o produto</option>{% for p in products %}<option value="{{p.id}}" data-price="{{p.price_cents}}">{{p.name}} — {{p.price_cents|money}} ({{p.stock}} un.)</option>{% endfor %}</select></div><div class="col-3"><input type="number" min="1" value="1" name="quantity" class="form-control quantity"></div><div class="col-1"><button type="button" class="btn btn-outline-danger remove">×</button></div></div></template>{% endblock %}
{% block scripts %}<script>
const items=document.querySelector('#items'),tpl=document.querySelector('#row'),method=document.querySelector('#payment-method'),pixButton=document.querySelector('#generate-pix');
const pixModalElement=document.querySelector('#pix-modal'),pixModal=bootstrap.Modal.getOrCreateInstance(pixModalElement),pixEndpoint={{ url_for('sales.pix_qrcode')|tojson }},pixToken={{ pix_token|tojson }};let saleTotal=0;
function total(){let n=0;document.querySelectorAll('.item-row').forEach(r=>{let o=r.querySelector('.product').selectedOptions[0],q=+r.querySelector('.quantity').value||0;n+=(+o?.dataset.price||0)*q});saleTotal=n;document.querySelector('#total').textContent=(n/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function add(){let row=tpl.content.cloneNode(true);items.append(row);total()}
function paymentChanged(){pixButton.classList.toggle('d-none',method.value!=='Pix')}
document.querySelector('#add').onclick=add;items.addEventListener('click',e=>{if(e.target.classList.contains('remove')){e.target.closest('.item-row').remove();total()}});items.addEventListener('input',total);method.addEventListener('change',paymentChanged);
pixButton.addEventListener('click',async()=>{const error=document.querySelector('#pix-error'),image=document.querySelector('#pix-image');error.classList.add('d-none');image.classList.add('d-none');if(!saleTotal){error.textContent='Selecione ao menos um produto.';error.classList.remove('d-none');pixModal.show();return}pixButton.disabled=true;pixButton.textContent='Gerando...';try{const url=new URL(pixEndpoint,window.location.href);url.searchParams.set('amount_cents',String(saleTotal));const response=await fetch(url.href,{cache:'no-store',headers:{Accept:'application/json','X-Pix-Token':pixToken}});const contentType=response.headers.get('content-type')||'';if(!contentType.includes('application/json')){throw new Error('O servidor não devolveu uma resposta válida. Tente novamente.')}const data=await response.json();if(!response.ok)throw new Error(data.error||'Não foi possível gerar o QR Code.');if(!data.image||!data.payload)throw new Error('O QR Code retornado está incompleto. Tente novamente.');image.src=data.image;image.classList.remove('d-none');document.querySelector('#pix-key').textContent=data.key;document.querySelector('#pix-payload').value=data.payload;document.querySelector('#pix-summary').textContent=`${data.amount} · BAR PELADEIROS GPCTA`}catch(e){error.textContent=e.message||'Não foi possível gerar o QR Code.';error.classList.remove('d-none')}finally{pixModal.show();pixButton.disabled=false;pixButton.textContent='Gerar QR Code Pix'}});
document.querySelector('#copy-pix').onclick=async()=>{const field=document.querySelector('#pix-payload'),button=document.querySelector('#copy-pix'),error=document.querySelector('#pix-error');if(!field.value)return;try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(field.value)}else{field.focus();field.select();if(!document.execCommand('copy'))throw new Error()}button.textContent='Código copiado!';setTimeout(()=>button.textContent='Copiar código Pix',1800)}catch(e){error.textContent='Não foi possível copiar automaticamente. Toque e segure o código para copiá-lo.';error.classList.remove('d-none')}};
add();paymentChanged();
</script>{% endblock %}
