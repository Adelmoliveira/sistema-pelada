{% extends 'base.html' %}
{% block title %}Criar senha · PELADEIROS GPCTA{% endblock %}
{% block content %}
<div class="row justify-content-center mt-lg-5"><div class="col-md-6 col-lg-4">
  <div class="text-center mb-4"><img src="{{url_for('static',filename='logo-gpcta.jpeg')}}" class="login-logo mb-3" alt="Logo GPCTA"><h1 class="h3">Primeiro acesso</h1><p class="text-muted">Olá, {{player.war_name}}. Cadastre uma senha para acessar a venda rápida.</p></div>
  <div class="card shadow-sm"><div class="card-body p-4"><form method="post" action="{{url_for('auth.client_password_setup')}}">
    <input type="hidden" name="csrf_token" value="{{csrf_token()}}">
    <label class="form-label">Nova senha</label><input type="password" name="password" class="form-control mb-3" minlength="8" autocomplete="new-password" required autofocus>
    <label class="form-label">Confirme a senha</label><input type="password" name="password_confirm" class="form-control mb-4" minlength="8" autocomplete="new-password" required>
    <button class="btn btn-success btn-lg w-100">Salvar e entrar</button>
  </form></div></div>
  <p class="text-center mt-3"><a href="{{url_for('auth.login')}}">Voltar para o login</a></p>
</div></div>
{% endblock %}
