<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07558c">
  <title>Sem conexão · Peladeiros GPCTA</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f2f6f9;color:#152d3d;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.offline-card{width:min(100%,420px);padding:32px;text-align:center;background:#fff;border-radius:20px;box-shadow:0 12px 40px #12364b1f}.offline-card img{width:96px;height:96px;border-radius:22px}.offline-card h1{font-size:1.55rem;margin:20px 0 8px}.offline-card p{color:#607d8b;line-height:1.55}.offline-card button{margin-top:12px;border:0;border-radius:10px;padding:12px 22px;background:#07558c;color:#fff;font-weight:700;font-size:1rem}
  </style>
</head>
<body>
  <main class="offline-card">
    <img src="/static/icons/pwa-192.png" alt="Logo GPCTA">
    <h1>Você está sem conexão</h1>
    <p>Pedidos, pagamentos e chamados precisam de internet. Verifique sua conexão e tente novamente.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </main>

</html>
