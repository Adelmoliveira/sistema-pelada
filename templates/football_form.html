{% extends "base.html" %}{% block title %}Nova súmula{% endblock %}{% block content %}<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-body"><h1 class="h3 mb-4">Nova súmula</h1><p class="text-muted">A data precisa ser uma quarta-feira ou sábado. Serão criadas duas partidas, com opção de adicionar a terceira.</p><form method="post"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><div class="row g-3"><div class="col-md-4"><label class="form-label">Data *</label><input class="form-control" type="date" name="match_date" value="{{today}}" required></div><div class="col-md-4"><label class="form-label">Horário</label><input class="form-control" name="horario" placeholder="Ex.: 19h30"></div><div class="col-md-4"><label class="form-label">Local</label><input class="form-control" name="local" value="Campo GPCTA"></div><div class="col-12"><label class="form-label">Observações</label><textarea class="form-control" name="observacoes" rows="4"></textarea></div></div><div class="mt-4 d-flex gap-2"><button class="btn btn-primary">Criar súmula</button><a class="btn btn-outline-secondary" href="{{url_for('football.sumulas')}}">Cancelar</a></div></form></div></div></div></div>{% endblock %}
