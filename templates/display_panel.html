<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07558c"><title>Painel · PELADEIROS GPCTA</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>
:root{--blue:#07558c;--ink:#183247;--soft:#eef5f9}body{margin:0;background:var(--soft);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh}.panel-header{background:var(--blue);color:#fff;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between}.panel-header h1{font-size:clamp(1.35rem,2.4vw,2.2rem);margin:0}.panel-header small{opacity:.8}.panel-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:1.25rem;padding:1.25rem;min-height:calc(100vh - 86px)}.panel-card{background:#fff;border-radius:1rem;box-shadow:0 4px 18px #1233  ;overflow:hidden}.panel-card h2{font-size:clamp(1.3rem,2vw,1.9rem);margin:0;padding:1rem 1.25rem;border-bottom:1px solid #d9e2e8}.order-list,.birthday-list{padding:0;margin:0;list-style:none}.order-item,.birthday-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid #e5edf2}.order-item:last-child,.birthday-item:last-child{border-bottom:0}.avatar{width:58px;height:58px;border-radius:50%;object-fit:cover;background:#dcecf5;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--blue);flex:none}.order-name{font-size:clamp(1.05rem,1.8vw,1.45rem);font-weight:700}.order-meta{color:#667985}.birthday-name{font-size:clamp(1rem,1.6vw,1.3rem);font-weight:650}.empty{padding:2rem;text-align:center;color:#738490;font-size:1.15rem}@media(max-width:800px){.panel-grid{grid-template-columns:1fr}.panel-card{min-height:240px}.panel-header{padding:1rem 1.25rem}}
</style></head><body><header class="panel-header"><div><h1>PELADEIROS GPCTA</h1><small>Acompanhe os pedidos e aniversariantes</small></div><div class="d-flex gap-2"><button class="btn btn-light" id="fullscreen">Tela cheia</button><form method="post" action="{{url_for('auth.logout')}}"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><button class="btn btn-outline-light">Sair</button></form></div></header><main class="panel-grid"><section class="panel-card"><h2>Pedidos em andamento</h2><ul class="order-list" id="orders"><li class="empty">Carregando pedidos...</li></ul></section><section class="panel-card"><h2>Aniversariantes do mês</h2><ul class="birthday-list" id="birthdays"><li class="empty">Carregando aniversariantes...</li></ul></section></main><script>
const orders=document.querySelector('#orders'),birthdays=document.querySelector('#birthdays');
function avatar(photo,name){return photo?`<img class="avatar" src="${photo}" alt="">`:`<div class="avatar">${(name||'?').slice(0,1).toUpperCase()}</div>`}
function render(data){orders.innerHTML=data.orders.length?data.orders.map(order=>`<li class="order-item">${avatar(order.player_photo,order.player_name)}<div><div class="order-name">${order.player_name}</div><div class="order-meta">Pedido #${order.id} · ${order.items.map(item=>`${item.quantity}× ${item.name}`).join(', ')}</div></div></li>`).join(''):'<li class="empty">Nenhum pedido aguardando entrega.</li>';birthdays.innerHTML=data.birthdays.length?data.birthdays.map(person=>`<li class="birthday-item">${avatar(person.thumbnail_data,person.war_name||person.name)}<div><div class="birthday-name">${person.war_name||person.name}</div><div class="order-meta">🎂 ${person.birth_date.slice(8,10)}/${person.birth_date.slice(5,7)}</div></div></li>`).join(''):'<li class="empty">Nenhum aniversariante neste mês.</li>'}
async function refresh(){try{const response=await fetch('{{url_for("display.feed")}}',{cache:'no-store'});if(response.ok)render(await response.json())}catch(_){}}refresh();setInterval(refresh,5000);document.querySelector('#fullscreen').addEventListener('click',()=>document.documentElement.requestFullscreen?.());
</script></body></html>
